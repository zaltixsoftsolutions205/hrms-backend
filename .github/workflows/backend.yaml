name: Simple CI/CD — EC2 Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # 3️⃣ Login to Public ECR
      - name: Login to Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws

      # 4️⃣ Build & Push Docker Image
      - name: Build and Push
        run: |
          IMAGE_URI=public.ecr.aws/g5p9n4i5/hrms-backend:latest
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      # 5️⃣ Cleanup Old Images (keep latest 10)
      - name: Cleanup Old ECR Images
        run: |
          IMAGE_IDS=$(aws ecr-public describe-images \
            --repository-name hrms-backend \
            --region us-east-1 \
            --query 'sort_by(imageDetails, &imagePushedAt)[:-10].imageDigest' \
            --output text)

          if [ ! -z "$IMAGE_IDS" ]; then
            for DIGEST in $IMAGE_IDS; do
              aws ecr-public batch-delete-image \
                --repository-name hrms-backend \
                --region us-east-1 \
                --image-ids imageDigest=$DIGEST
              echo "Deleted old image: $DIGEST"
            done
          else
            echo "No old images to clean up."
          fi

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_URI=public.ecr.aws/g5p9n4i5/hrms-backend:latest
            echo "Pulling latest image..."
            docker pull $IMAGE_URI
            echo "Stopping any container using port 5000..."
            CONTAINER_ID=$(docker ps -q --filter "publish=5000")
            if [ ! -z "$CONTAINER_ID" ]; then
              docker stop $CONTAINER_ID
              docker rm $CONTAINER_ID
            fi
            echo "Removing old myapp container if exists..."
            docker rm -f myapp || true
            echo "Starting new container with env file..."
            docker run -d \
              --name myapp \
              -p 5000:5000 \
              --env-file /home/ubuntu/hrms/.env \
              --restart always \
              $IMAGE_URI
            echo "Deployment successful 🚀"
